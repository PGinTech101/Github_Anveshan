<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github_Anveshan</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 <div id="search_wrapper">
  <label for="site_search">Search the site:</label>
  <div id="search_input_group">
    <input type="search" id="site_search" name="q" placeholder="Search git hub profile" />
    <button id="search_button">Search</button>
  </div>
</div>

<div id="card_container">
  <div id="top_row">
    <div id="avatar_group">
      <div id="profile_circle"></div> 
      <div id="followers_box" class="box">Followers</div>
    </div>
    
    <div id="bio_group">
      <div id="username_box" class="box">Username</div>
      <div id="bio_box" class="box">Bio</div>
    </div>
  </div>

  <div id="repo_count_box" class="box">Repo count</div>
  <div id="profile_link_box" class="box">Profile Link</div>
</div>
<script src="script.js" defer></script>
</body>
</html>
