<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github_Anveshan</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 <div id="search_wrapper">
  <label for="site_search">Search GitHub user</label>
  <div id="search_input_group">
    <input type="search" id="site_search" name="q" placeholder="Enter username..." />
    <button id="search_button">Search</button>
  </div>
</div>

<div id="loader" class="spinner"></div>

<div id="card_container">
  <div id="top_row">
    <div id="avatar_group">
      <div id="profile_circle"></div> 
    </div>
    <div id="bio_group">
      <div id="username_box" class="box">Username</div>
      <div id="bio_box" class="box">Bio</div>
    </div>
  </div>

  <div id="stats_row">
    <div class="stat-item">
      <span class="label">Followers</span>
      <span id="followers_val" class="value">-</span>
    </div>
    <div class="stat-item">
      <span class="label">Following</span>
      <span id="following_val" class="value">-</span>
    </div>
    <div class="stat-item">
      <span class="label">Repos</span>
      <span id="repo_val" class="value">-</span>
    </div>
  </div>

  <div id="meta_row">
    <div class="meta-item">
      <span class="label">📍</span>
      <span id="location_val" class="value">N/A</span>
    </div>
    <div class="meta-item">
      <span class="label">🏢</span>
      <span id="company_val" class="value">N/A</span>
    </div>
  </div>

  <div id="profile_link_box">
    <span id="link_container">Profile Link will appear here</span>
    <button id="copyBtn" class="github-btn-secondary">
      <svg aria-hidden="true" height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
        <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
      </svg>
      <span id="copyText">Copy</span>
    </button>
  </div>

<div id="top_repos_section" style="display: none;">
    <h3 class="section-title">Recently Updated Repositories</h3>
    <div class="repos-grid" id="repos_grid_container"></div>
  </div>
</body>
<script src="script.js"></script>
</html>
